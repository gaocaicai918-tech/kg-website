<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 缓存控制 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>知识图谱系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s ease;
    }

    /* 登录后的浅色背景 */
    body.logged-in {
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
    }

    /* 登录页面样式 */
    .login-container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .login-container h1 {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #334155;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
      background: #fff;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .code-input-group {
      display: flex;
      gap: 10px;
    }

    .code-input-group input {
      flex: 1;
    }

    .send-code-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      min-width: 100px;
    }

    .send-code-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }

    .send-code-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #ef4444;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }

    /* 导航页面样式 */
    .nav-container {
      display: none;
      width: 100%;
      max-width: 1200px;
    }

    .nav-container.active {
      display: block;
    }

    .nav-header {
      text-align: center;
      margin-bottom: 50px;
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
    }

    .nav-header h1 {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
    }

    .nav-header p {
      color: #64748b;
      font-size: 16px;
    }

    .nav-cards {
      display: flex;
      justify-content: space-between;
      gap: 30px;
    }

    @media (max-width: 768px) {
      .nav-cards {
        flex-direction: column;
      }
    }

    .nav-card {
      flex: 1;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
      text-decoration: none;
      color: inherit;
      display: block;
      min-width: 0;
    }

    .nav-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    .nav-card.math {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
    }

    .nav-card.language {
      background: linear-gradient(135deg, rgba(255, 140, 66, 0.1) 0%, rgba(229, 90, 0, 0.1) 100%);
    }

    .nav-card.english {
      background: linear-gradient(135deg, #20B2AA 0%, #1a9088 100%);
    }

    .nav-card.kindergarten {
      background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
    }



    .nav-card.planet:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(139, 92, 246, 0.25);
    }

    .nav-card.planet h2 {
      background: linear-gradient(135deg, #8B5CF6 0%, #6366F1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-card-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .nav-card h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #1e293b;
    }

    .nav-card.math h2 {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-card.language h2 {
      background: linear-gradient(135deg, #ff8c42 0%, #e55a00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-card.english h2 {
      background: #fff;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-card.kindergarten h2 {
      background: #fff;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-card p {
      color: #64748b;
      font-size: 16px;
    }

    .logout-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #64748b;
    }

    .logout-btn:hover {
      background: #fff;
      border-color: #667eea;
      color: #667eea;
    }
  </style>
</head>

<body>
  <!-- 登录页面 -->
  <div class="login-container" id="loginContainer">
    <h1>知识图谱系统</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="mobile">手机号</label>
        <input type="tel" id="mobile" name="mobile" required autocomplete="tel" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
      </div>
      <button type="submit" class="login-btn" id="loginBtn">登录</button>
      <div class="error-message" id="errorMessage"></div>
    </form>
  </div>

  <!-- 导航页面 -->
  <div class="nav-container" id="navContainer">
    <button class="logout-btn" id="logoutBtn">退出登录</button>
    <div class="nav-header">
      <h1>解锁你的个性化知识图谱</h1>
      <p>选择您要访问的模块</p>
    </div>
    <div class="nav-cards">
      <a href="math/index.html" class="nav-card math">
        <div class="nav-card-icon">📐</div>
        <h2>数学</h2>
        <p>数学知识图谱导航</p>
      </a>
      <a href="language/index.html" class="nav-card language">
        <div class="nav-card-icon">📚</div>
        <h2>语文</h2>
        <p>语文知识图谱导航</p>
      </a>
      <a href="english/index.html" class="nav-card english">
        <div class="nav-card-icon">🔤</div>
        <h2>英语</h2>
        <p>英语知识图谱导航</p>
      </a>
      <a href="kindergarten/index.html" class="nav-card kindergarten">
        <div class="nav-card-icon">👶</div>
        <h2>幼儿园</h2>
        <p>幼儿园知识图谱导航</p>
      </a>
      <a href="planet-explorer.html" class="nav-card planet">
        <div class="nav-card-icon">🪐</div>
        <h2>星球探索</h2>
        <p>7大学科 · 测评 · 知识卡</p>
      </a>

    </div>
  </div>

  <script>
    // ── 登录状态检查 ──────────────────────────────
    function checkLoginStatus() {
      return !!localStorage.getItem('authPhone');
    }

    function showLoginPage() {
      document.getElementById('loginContainer').style.display = 'block';
      document.getElementById('navContainer').classList.remove('active');
      document.body.classList.remove('logged-in');
    }

    function showNavPage() {
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('navContainer').classList.add('active');
      document.body.classList.add('logged-in');
    }

    // ── 登录处理（手机号 + 密码）────────────────────
    function handleLogin(event) {
      event.preventDefault();

      const phone = document.getElementById('mobile').value.trim();
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');

      // 验证手机号
      if (!phone) {
        errorMessage.textContent = '请输入手机号';
        return;
      }
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        errorMessage.textContent = '请输入正确的手机号';
        return;
      }

      // 验证密码
      if (!password) {
        errorMessage.textContent = '请输入密码';
        return;
      }

      // 检查白名单（APP_CONFIG 来自 config.js）
      const whitelist = (window.APP_CONFIG && window.APP_CONFIG.whitelist) || [];
      const matched = whitelist.find(function (u) {
        return u.phone === phone && u.password === password;
      });

      if (!matched) {
        errorMessage.textContent = '手机号或密码错误，或该手机号未授权';
        return;
      }

      // 登录成功
      errorMessage.textContent = '';
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';

      setTimeout(function () {
        localStorage.setItem('authPhone', phone);
        localStorage.setItem('authLoginTime', new Date().getTime().toString());
        showNavPage();
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      }, 300);
    }

    // ── 退出登录 ──────────────────────────────
    function handleLogout() {
      localStorage.removeItem('authPhone');
      localStorage.removeItem('authLoginTime');
      showLoginPage();
      document.getElementById('loginForm').reset();
    }

    // ── 初始化 ──────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      document.getElementById('logoutBtn').addEventListener('click', handleLogout);

      // 已登录则直接显示导航页
      if (checkLoginStatus()) {
        showNavPage();
      }
    });
  </script>
</body>

</html>
